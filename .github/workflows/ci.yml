name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      # The internal/amp package has five known-flaky secret/config cache
      # tests that pre-date amp-proxy and share global state between
      # subtests. They are intentionally not part of CI until the upstream
      # cherry-pick that rewrote that subsystem lands. The customproxy
      # package carries every amp-proxy-specific behavior we care about
      # (routing, stream upgrade, SSE rewriting, Gemini translation) and
      # is the coverage target that must stay green.
      - name: Go test (customproxy)
        run: go test -count=1 ./internal/customproxy/...
